name: Backup Semanal de Produtos

on:
  schedule:
    - cron: '0 3 * * 0'  # Todo domingo 03:00 UTC = 00:00 Brasilia
  workflow_dispatch:       # Permite rodar manualmente

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buscar produtos (com retry para Render acordar)
        run: |
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -sf --max-time 60 "https://sofa-king.onrender.com/api/products?limit=500" 2>/dev/null)
            if [ -n "$RESPONSE" ]; then
              echo "$RESPONSE" > /tmp/products_raw.json
              COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else len(d.get('products',d.get('data',[]))))" 2>/dev/null)
              echo "OK: $COUNT produtos recebidos (tentativa $i)"
              break
            fi
            echo "Tentativa $i falhou, aguardando 30s..."
            sleep 30
          done
          [ -f /tmp/products_raw.json ] || (echo "ERRO: nao foi possivel buscar produtos" && exit 1)

      - name: Salvar backup com data
        run: |
          mkdir -p backups
          DATE=$(date +%Y-%m-%d)
          python3 - << 'PYEOF'
          import json, shutil, os, subprocess
          date = subprocess.check_output('date +%Y-%m-%d', shell=True).decode().strip()
          data = json.load(open('/tmp/products_raw.json'))
          arr = data if isinstance(data, list) else data.get('products', data.get('data', []))
          out = {'backup_date': date, 'total_products': len(arr), 'products': arr}
          fname = f'backups/products-{date}.json'
          json.dump(out, open(fname, 'w', encoding='utf-8'), ensure_ascii=False, indent=2)
          shutil.copy(fname, 'backups/latest.json')
          print(f'Salvos {len(arr)} produtos em {fname}')
          # Manter apenas os 12 backups mais recentes (3 meses)
          files = sorted([f for f in os.listdir('backups') if f.startswith('products-')])
          for old in files[:-12]:
              os.remove(f'backups/{old}')
              print(f'Removido backup antigo: {old}')
          PYEOF

      - name: Commit e push
        run: |
          git config user.email "backup-bot@sofa-king.com"
          git config user.name "Backup Bot"
          git add backups/
          if git diff --staged --quiet; then
            echo "Sem mudancas para commitar"
          else
            DATE=$(date +%Y-%m-%d)
            COUNT=$(python3 -c "import json; d=json.load(open('backups/latest.json')); print(d['total_products'])")
            git commit -m "backup: $COUNT produtos em $DATE"
            git push
            echo "Backup enviado com sucesso!"
          fi
