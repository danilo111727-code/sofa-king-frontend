name: Keep Backend Warm

on:
  schedule:
    - cron: '*/10 * * * *'  # A cada 10 minutos

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://sofa-king.onrender.com/api/products?limit=1")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend ativo (HTTP $STATUS)"
          else
            echo "⚠️ Backend respondeu HTTP $STATUS"
          fi
